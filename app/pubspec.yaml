name: receipt24
description: "Receipt24 - Every Receipt. One Place."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Backend (Phase 1.3 architecture): Supabase provides Auth, Postgres,
  # Storage and Edge Functions behind one client. Only the anon (public) key
  # ever ships in this app — see lib/core/env/env.dart and docs/ENVIRONMENTS.md.
  supabase_flutter: ^2.8.0

  # UI (Phase 15 design system): Inter / Manrope / DM Sans are all Google Fonts.
  google_fonts: ^6.2.1

  equatable: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/branding/
