# Receipt24 production nginx configuration
# Serves three Flutter web apps on separate subdomains.
#
# Mount build outputs:
#   /var/www/consumer      -> build/web/consumer
#   /var/www/accountant    -> build/web/accountant
#   /var/www/admin         -> build/web/admin

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

  # Security headers (all sites)
  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  server {
    listen 80;
    server_name app.receipt24.com;
    root /var/www/consumer;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
      try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
      expires 30d;
      add_header Cache-Control "public, immutable";
    }
  }

  server {
    listen 80;
    server_name accountant.receipt24.com;
    root /var/www/accountant;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
      try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
      expires 30d;
      add_header Cache-Control "public, immutable";
    }
  }

  server {
    listen 80;
    server_name admin.receipt24.com;
    root /var/www/admin;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
      try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
      expires 30d;
      add_header Cache-Control "public, immutable";
    }
  }
}
