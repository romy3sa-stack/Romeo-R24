name: receipt24_consumer
description: Receipt24 Consumer App — mobile-first receipt management.
publish_to: none
version: 0.3.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  supabase_flutter: ^2.8.0
  go_router: ^14.2.0
  flutter_riverpod: ^2.5.1
  receipt24_shared:
    path: ../../packages/receipt24_shared
  google_fonts: ^6.2.1
  flutter_dotenv: ^5.1.0
  file_picker: ^8.1.2
  image_picker: ^1.1.2
  intl: ^0.19.0
  uuid: ^4.5.1
  fl_chart: ^0.69.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env
