# Supabase project configuration for Receipt24.
#
# This single config.toml drives the LOCAL development stack (`supabase start`).
# The Test and Production Supabase *projects* are separate hosted projects
# (see docs/ENVIRONMENTS.md) and are configured entirely through environment
# variables and the Supabase Dashboard / `supabase link`, never by editing this
# file per-environment.

project_id = "receipt24"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[db.pooler]
enabled = false

[studio]
enabled = true
port = 54323

[inbucket]
# Used locally to capture outgoing email (verification, invitations, etc.)
# during development instead of sending real email.
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://app.receipt24.com", "https://accountant.receipt24.com", "https://admin.receipt24.com"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
minimum_password_length = 8
password_requirements = "lower_upper_letters_digits"

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = true

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.rate_limit]
sign_in_sign_ups = 30
token_refresh = 150
sms_sent = 30
email_sent = 30

[edge_runtime]
enabled = true
policy = "oneshot"

[analytics]
enabled = false
