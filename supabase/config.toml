project_id = "receipt24"

[api]
enabled = true
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = [
  "http://localhost:3000/**",
  "https://app.receipt24.com/**",
  "https://accountant.receipt24.com/**",
  "https://admin.receipt24.com/**"
]
jwt_expiry = 3600
enable_signup = true

[storage]
enabled = true
file_size_limit = "20MiB"

[db]
major_version = 17
